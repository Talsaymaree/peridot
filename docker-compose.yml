services:
  peridot-web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3010:3000"
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      DATABASE_URL: file:/data/peridot.db
    volumes:
      - peridot-data:/data
    restart: unless-stopped

volumes:
  peridot-data:
